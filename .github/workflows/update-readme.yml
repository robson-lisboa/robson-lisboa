name: Update README Projects

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: gautamkrishnar/blog-post-workflow@master
        with:
          comment_tag_name: "projects"
          feed_list: "https://api.github.com/users/robson-lisboa/repos?sort=created&direction=desc"
